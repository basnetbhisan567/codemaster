<!DOCTYPE html>
<html lang="en" class="dark" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <title>CodeMaster - Premium Coding Education | AI Tutor & Focus Mode</title>
    <meta name="description" content="Master programming with our premium coding platform. 500+ problems, AI tutor, focus mode, and real projects." />
    <meta name="theme-color" content="#0a0e17" id="theme-color-meta" />
    
    <!-- Favicon (multiple formats for all browsers) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' style='stop-color:%233b82f6'/><stop offset='100%25' style='stop-color:%238b5cf6'/></linearGradient></defs><rect width='100' height='100' rx='20' fill='url(%23g)'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>&lt;/&gt;</text></svg>" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>&lt;/&gt;</text></svg>" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%233b82f6'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>C</text></svg>" />
    <style>
      /* ============================================
         🎨 EPIC MULTI-THEME SYSTEM - 6 THEMES
         ============================================ */
      
      [data-theme="dark"] {
        --bg-primary: #0a0e17;
        --bg-secondary: #141a2b;
        --bg-gradient-1: #0f172a;
        --bg-gradient-2: #1e1b4b;
        --bg-gradient-3: #0c1445;
        --accent-glow-1: #3b82f6;
        --accent-glow-2: #8b5cf6;
        --accent-glow-3: #06b6d4;
        --text-primary: #ffffff;
        --text-secondary: #94a3b8;
        --border-color: rgba(59, 130, 246, 0.2);
        --card-bg: rgba(20, 30, 55, 0.7);
        --loader-bg: #0a0e17;
      }

      [data-theme="light"] {
        --bg-primary: #f0f4f8;
        --bg-secondary: #e2e8f0;
        --bg-gradient-1: #e0e7ff;
        --bg-gradient-2: #fce7f3;
        --bg-gradient-3: #cffafe;
        --accent-glow-1: #2563eb;
        --accent-glow-2: #7c3aed;
        --accent-glow-3: #0891b2;
        --text-primary: #0f172a;
        --text-secondary: #334155;
        --border-color: rgba(37, 99, 235, 0.15);
        --card-bg: rgba(255, 255, 255, 0.8);
        --loader-bg: #f0f4f8;
      }

      [data-theme="white"] {
        --bg-primary: #ffffff;
        --bg-secondary: #f8fafc;
        --bg-gradient-1: #f1f5f9;
        --bg-gradient-2: #f8fafc;
        --bg-gradient-3: #e2e8f0;
        --accent-glow-1: #000000;
        --accent-glow-2: #374151;
        --accent-glow-3: #4b5563;
        --text-primary: #000000;
        --text-secondary: #4b5563;
        --border-color: rgba(0, 0, 0, 0.1);
        --card-bg: rgba(255, 255, 255, 0.9);
        --loader-bg: #ffffff;
      }

      [data-theme="forest"] {
        --bg-primary: #061e14;
        --bg-secondary: #0a2d1e;
        --bg-gradient-1: #064e3b;
        --bg-gradient-2: #065f46;
        --bg-gradient-3: #047857;
        --accent-glow-1: #10b981;
        --accent-glow-2: #34d399;
        --accent-glow-3: #6ee7b7;
        --text-primary: #ecfdf5;
        --text-secondary: #a7f3d0;
        --border-color: rgba(16, 185, 129, 0.2);
        --card-bg: rgba(10, 45, 30, 0.7);
        --loader-bg: #061e14;
      }

      [data-theme="sunset"] {
        --bg-primary: #1a0e1a;
        --bg-secondary: #2d1a2d;
        --bg-gradient-1: #2d1a2d;
        --bg-gradient-2: #4a1e3a;
        --bg-gradient-3: #3d1a3d;
        --accent-glow-1: #f97316;
        --accent-glow-2: #ec4899;
        --accent-glow-3: #f43f5e;
        --text-primary: #fff1f2;
        --text-secondary: #fecdd3;
        --border-color: rgba(249, 115, 22, 0.2);
        --card-bg: rgba(60, 25, 50, 0.7);
        --loader-bg: #1a0e1a;
      }

      [data-theme="ocean"] {
        --bg-primary: #0a1a2a;
        --bg-secondary: #0d2840;
        --bg-gradient-1: #0d2840;
        --bg-gradient-2: #1a3a5c;
        --bg-gradient-3: #0a3d5c;
        --accent-glow-1: #06b6d4;
        --accent-glow-2: #0ea5e9;
        --accent-glow-3: #3b82f6;
        --text-primary: #ecfeff;
        --text-secondary: #a5f3fc;
        --border-color: rgba(6, 182, 212, 0.2);
        --card-bg: rgba(20, 50, 80, 0.7);
        --loader-bg: #0a1a2a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
      
      body {
        margin: 0;
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
        color: var(--text-primary);
        background: var(--bg-primary);
        position: relative;
        overflow-x: hidden;
        transition: background 0.5s ease, color 0.3s ease;
      }

      /* Fullscreen Playground Mode */
      body.playground-fullscreen {
        overflow: hidden !important;
        height: 100vh !important;
      }
      body.playground-fullscreen::before,
      body.playground-fullscreen::after {
        display: none !important;
      }
      body.playground-fullscreen .theme-toggle-container {
        display: none !important;
      }

      /* Epic Animated Background */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: 
          radial-gradient(circle at 20% 30%, var(--bg-gradient-1) 0%, transparent 50%),
          radial-gradient(circle at 80% 70%, var(--bg-gradient-2) 0%, transparent 55%),
          radial-gradient(circle at 50% 50%, var(--bg-gradient-3) 0%, transparent 60%),
          linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
        opacity: 1;
        z-index: -2;
        transition: all 0.5s ease;
        animation: bgPulse 15s ease-in-out infinite alternate;
      }

      @keyframes bgPulse {
        0% { opacity: 0.8; }
        50% { opacity: 1; }
        100% { opacity: 0.9; }
      }

      /* Grid Overlay */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image: 
          linear-gradient(to right, var(--border-color) 1px, transparent 1px),
          linear-gradient(to bottom, var(--border-color) 1px, transparent 1px);
        background-size: 60px 60px;
        opacity: 0.2;
        z-index: -1;
        pointer-events: none;
        animation: gridMove 40s linear infinite;
      }

      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 60px 60px; }
      }

      #root { 
        min-height: 100vh; 
        display: flex; 
        flex-direction: column;
        position: relative;
        z-index: 1;
      }

      /* ============================================
         🎨 THEME TOGGLE
         ============================================ */
      
      .theme-toggle-container {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9998;
      }
      
      .theme-toggle {
        display: flex;
        gap: 8px;
        padding: 10px;
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        flex-wrap: wrap;
        justify-content: center;
      }
      
      .theme-btn {
        width: 48px;
        height: 48px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        background: transparent;
        color: var(--text-secondary);
        transition: all 0.2s ease;
        position: relative;
      }
      
      .theme-btn:hover {
        color: var(--text-primary);
        transform: scale(1.1);
        background: var(--bg-secondary);
      }
      
      .theme-btn.active {
        color: var(--accent-glow-1);
        background: var(--bg-secondary);
        box-shadow: 0 0 15px var(--accent-glow-1);
        border: 1px solid var(--accent-glow-1);
      }

      /* ============================================
         🎬 LOADER
         ============================================ */
      
      .initial-loader {
        position: fixed;
        inset: 0;
        background: var(--loader-bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      
      .initial-loader.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      
      .loader-logo {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--accent-glow-1), var(--accent-glow-2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 30px;
        animation: loaderPulse 2s ease-in-out infinite;
      }
      
      @keyframes loaderPulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.05); }
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid var(--border-color);
        border-top-color: var(--accent-glow-1);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ============================================
         📱 RESPONSIVE
         ============================================ */
      
      @media (max-width: 768px) {
        .theme-toggle-container { 
          bottom: 20px; 
          right: 50%;
          transform: translateX(50%);
        }
        .theme-btn { width: 40px; height: 40px; font-size: 18px; }
        .theme-toggle { gap: 4px; padding: 8px; }
        .loader-logo { font-size: 36px; }
      }

      @media (max-width: 480px) {
        .theme-btn { width: 36px; height: 36px; font-size: 16px; }
      }
    </style>
  </head>
  <body>
    <!-- Loader -->
    <div class="initial-loader" id="loading-screen">
      <div class="loader-logo">CodeMaster</div>
      <div class="loader-spinner"></div>
    </div>
    
    <!-- React Mount -->
    <div id="root"></div>
    
    <!-- Theme Toggle -->
    <div class="theme-toggle-container">
      <div class="theme-toggle">
        <button class="theme-btn active" data-theme="dark" onclick="switchTheme('dark')" title="Dark Mode">🌙</button>
        <button class="theme-btn" data-theme="light" onclick="switchTheme('light')" title="Light Mode">☀️</button>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>

    <script>
      (function() {
        const themes = ['dark', 'light',];
        const themeColors = { 
          dark: '#0a0e17', light: '#f0f4f8'
        };
        
        window.switchTheme = function(theme) {
          if (!themes.includes(theme)) return;
          
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.className = theme;
          localStorage.setItem('codemaster-theme', theme);
          
          const metaTheme = document.getElementById('theme-color-meta');
          if (metaTheme) metaTheme.setAttribute('content', themeColors[theme]);
          
          document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.theme === theme) btn.classList.add('active');
          });
        };
        
        // Restore saved theme
        const savedTheme = localStorage.getItem('codemaster-theme') || 'dark';
        switchTheme(savedTheme);
        
        // ============================================
        // LOADER REMOVAL - Multiple strategies
        // ============================================
        
        function removeLoader() {
          const loader = document.getElementById('loading-screen');
          if (loader && !loader.classList.contains('hidden')) {
            loader.classList.add('hidden');
            setTimeout(() => {
              if (loader.parentNode) loader.remove();
            }, 500);
          }
        }
        
        // Strategy 1: Check if React rendered
        const checkReact = setInterval(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0 && root.textContent.trim().length > 0) {
            removeLoader();
            clearInterval(checkReact);
          }
        }, 100);
        
        // Strategy 2: Fallback timeout (5 seconds max)
        setTimeout(() => {
          removeLoader();
          clearInterval(checkReact);
        }, 5000);
        
        // Strategy 3: Window load event
        window.addEventListener('load', () => {
          setTimeout(removeLoader, 500);
        });
        
        // Keyboard shortcut Ctrl+Shift+T
        document.addEventListener('keydown', (e) => {
          if (e.ctrlKey && e.shiftKey && e.key === 'T') {
            e.preventDefault();
            const current = document.documentElement.getAttribute('data-theme');
            const currentIndex = themes.indexOf(current);
            const next = themes[(currentIndex + 1) % themes.length];
            switchTheme(next);
          }
        });
      })();
    </script>
    
    <noscript>
      <div style="display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0a0e17; color: white; font-family: system-ui; text-align: center; padding: 2rem;">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: 1rem;">⚠️ JavaScript Required</h1>
          <p style="color: #94a3b8;">Please enable JavaScript to use CodeMaster.</p>
        </div>
      </div>
    </noscript>
  </body>
</html>
