<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Test - CodeMaster</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: #0a0e17;
            color: white;
            font-family: 'Inter', sans-serif;
        }
        h1 {
            text-align: center;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .test-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        .test-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .test-card h3 {
            margin-top: 0;
            color: #60a5fa;
        }
        .status {
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
        }
        .status.success {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        .status.error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
        .canvas-container {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            overflow: hidden;
            margin: 10px 0;
            background: #050510;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
        #console-log {
            background: #1a1f2e;
            border-radius: 8px;
            padding: 15px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .log-success { color: #22c55e; }
        .log-error { color: #ef4444; }
        .log-warning { color: #eab308; }
        .log-info { color: #60a5fa; }
    </style>
</head>
<body>
    <h1>🎮 CodeMaster - 3D Library Test</h1>
    
    <div class="test-grid">
        <div class="test-card">
            <h3>Three.js</h3>
            <div id="three-canvas" class="canvas-container"></div>
            <div id="three-status" class="status">Testing...</div>
        </div>
        <div class="test-card">
            <h3>Postprocessing</h3>
            <div id="post-canvas" class="canvas-container"></div>
            <div id="post-status" class="status">Testing...</div>
        </div>
        <div class="test-card">
            <h3>OGL (Galaxy)</h3>
            <div id="ogl-canvas" class="canvas-container"></div>
            <div id="ogl-status" class="status">Testing...</div>
        </div>
    </div>
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button onclick="runAllTests()">▶ Run All Tests</button>
        <button onclick="testThree()">Test Three.js</button>
        <button onclick="testPostprocessing()">Test Postprocessing</button>
        <button onclick="testOGL()">Test OGL</button>
        <button onclick="clearLogs()">Clear Logs</button>
    </div>
    
    <h3>📋 Console Log</h3>
    <div id="console-log"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "/node_modules/three/build/three.module.js",
                "three/addons/": "/node_modules/three/examples/jsm/",
                "postprocessing": "/node_modules/postprocessing/build/postprocessing.esm.js",
                "ogl": "/node_modules/ogl/dist/ogl.umd.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer, RenderPass, BloomEffect, EffectPass } from 'postprocessing';
        
        // Make available globally for button clicks
        window.THREE = THREE;
        window.postprocessing = { EffectComposer, RenderPass, BloomEffect, EffectPass };
        
        // OGL will be loaded from UMD
        
        // Logging system
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('console-log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        window.clearLogs = function() {
            document.getElementById('console-log').innerHTML = '';
            addLog('Console cleared', 'info');
        };
        
        // Test Three.js
        window.testThree = function() {
            addLog('Testing Three.js...', 'info');
            const container = document.getElementById('three-canvas');
            container.innerHTML = '';
            const status = document.getElementById('three-status');
            
            try {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x050510);
                
                const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.z = 3;
                
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);
                
                const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x3b82f6, 
                    emissive: 0x1e3a8a,
                    roughness: 0.2,
                    metalness: 0.8
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                const light = new THREE.PointLight(0x3b82f6, 1);
                light.position.set(2, 2, 2);
                scene.add(light);
                
                const ambientLight = new THREE.AmbientLight(0x404060);
                scene.add(ambientLight);
                
                let animationId;
                function animate() {
                    animationId = requestAnimationFrame(animate);
                    mesh.rotation.x += 0.01;
                    mesh.rotation.y += 0.01;
                    renderer.render(scene, camera);
                }
                animate();
                
                status.className = 'status success';
                status.textContent = '✅ Three.js Working!';
                addLog('Three.js test passed - TorusKnot rotating', 'success');
                
                // Store for cleanup
                window._threeCleanup = () => {
                    cancelAnimationFrame(animationId);
                    renderer.dispose();
                };
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ Three.js Failed';
                addLog(`Three.js error: ${error.message}`, 'error');
            }
        };
        
        // Test Postprocessing
        window.testPostprocessing = function() {
            addLog('Testing Postprocessing...', 'info');
            const container = document.getElementById('post-canvas');
            container.innerHTML = '';
            const status = document.getElementById('post-status');
            
            try {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x050510);
                
                const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
                camera.position.z = 3;
                
                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(container.clientWidth, container.clientHeight);
                container.appendChild(renderer.domElement);
                
                const composer = new EffectComposer(renderer);
                const renderPass = new RenderPass(scene, camera);
                composer.addPass(renderPass);
                
                const bloomPass = new EffectPass(camera, new BloomEffect({
                    intensity: 0.5,
                    luminanceThreshold: 0.1
                }));
                composer.addPass(bloomPass);
                
                const geometry = new THREE.SphereGeometry(1, 32, 32);
                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x8b5cf6, 
                    emissive: 0x4c1d95,
                    roughness: 0.1,
                    metalness: 0.3
                });
                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                
                const light = new THREE.PointLight(0x8b5cf6, 1);
                light.position.set(2, 2, 2);
                scene.add(light);
                
                let animationId;
                function animate() {
                    animationId = requestAnimationFrame(animate);
                    mesh.rotation.y += 0.01;
                    composer.render();
                }
                animate();
                
                status.className = 'status success';
                status.textContent = '✅ Postprocessing Working!';
                addLog('Postprocessing test passed - Bloom effect active', 'success');
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ Postprocessing Failed';
                addLog(`Postprocessing error: ${error.message}`, 'error');
            }
        };
        
        // Test OGL
        window.testOGL = async function() {
            addLog('Testing OGL...', 'info');
            const container = document.getElementById('ogl-canvas');
            container.innerHTML = '';
            const status = document.getElementById('ogl-status');
            
            try {
                // Load OGL from UMD
                const OGL = await import('/node_modules/ogl/dist/ogl.umd.js');
                const { Renderer, Camera, Transform, Program, Mesh, Triangle } = OGL.default || OGL;
                
                const renderer = new Renderer({ 
                    width: container.clientWidth, 
                    height: container.clientHeight,
                    alpha: false
                });
                const gl = renderer.gl;
                gl.clearColor(0.02, 0.02, 0.04, 1);
                container.appendChild(gl.canvas);
                
                const camera = new Camera(gl);
                camera.position.z = 3;
                
                const scene = new Transform();
                
                const geometry = new Triangle(gl);
                
                const program = new Program(gl, {
                    vertex: `
                        attribute vec2 uv;
                        attribute vec2 position;
                        varying vec2 vUv;
                        uniform float uTime;
                        void main() {
                            vUv = uv;
                            gl_Position = vec4(position, 0, 1);
                        }
                    `,
                    fragment: `
                        precision highp float;
                        varying vec2 vUv;
                        uniform float uTime;
                        void main() {
                            vec3 color1 = vec3(0.23, 0.51, 0.96);
                            vec3 color2 = vec3(0.55, 0.35, 0.96);
                            float mixValue = sin(vUv.x * 10.0 + uTime) * 0.5 + 0.5;
                            vec3 color = mix(color1, color2, mixValue);
                            gl_FragColor = vec4(color, 1.0);
                        }
                    `,
                    uniforms: {
                        uTime: { value: 0 }
                    }
                });
                
                const mesh = new Mesh(gl, { geometry, program });
                mesh.setParent(scene);
                
                let animationId;
                function animate(t) {
                    animationId = requestAnimationFrame(animate);
                    program.uniforms.uTime.value = t * 0.001;
                    renderer.render({ scene, camera });
                }
                animate(0);
                
                status.className = 'status success';
                status.textContent = '✅ OGL Working!';
                addLog('OGL test passed - Animated shader active', 'success');
            } catch (error) {
                status.className = 'status error';
                status.textContent = '❌ OGL Failed';
                addLog(`OGL error: ${error.message}`, 'error');
                console.error('OGL Error:', error);
            }
        };
        
        window.runAllTests = function() {
            clearLogs();
            addLog('🚀 Running all 3D library tests...', 'info');
            testThree();
            setTimeout(() => testPostprocessing(), 500);
            setTimeout(() => testOGL(), 1000);
        };
        
        // Auto-run on load
        addLog('✨ 3D Library Test Suite Ready', 'success');
        addLog('Click "Run All Tests" to begin', 'info');
        setTimeout(runAllTests, 500);
    </script>
</body>
</html>
